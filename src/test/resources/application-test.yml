server:
  port: 3333

app:
  base-url: http://localhost:3333
  hashids:
    min-length: 4
    salt: testing-this-out

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  application:
    name: Ludwigit
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:ludwigit
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
